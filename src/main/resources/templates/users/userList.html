<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout (~{::body},'users')}">
<body>
  <h2 th:text="#{manageUsers}">Manage Users</h2>

  <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <a th:href="@{/users/new}" class="btn btn-primary mb-3">
    <span class="fa fa-plus"></span> Add User
  </a>

  <table class="table table-striped">
    <thead>
      <tr>
        <th th:text="#{username}">Username</th>
        <th th:text="#{role}">Role</th>
        <th th:text="#{enabled}">Enabled</th>
        <th th:text="#{actions}">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="user : ${users}">
        <td th:text="${user.username}"></td>
        <td th:text="${user.role}"></td>
        <td>
          <span th:if="${user.enabled}" class="fa fa-check text-success"></span>
          <span th:unless="${user.enabled}" class="fa fa-times text-danger"></span>
        </td>
        <td>
          <a th:href="@{/users/{id}/edit(id=${user.id})}" class="btn btn-sm btn-outline-secondary" th:text="#{edit}">Edit</a>
          <form th:action="@{/users/{id}/delete(id=${user.id})}" method="post" class="d-inline"
                onsubmit="return confirm('Delete this user?')">
            <button type="submit" class="btn btn-sm btn-outline-danger" th:text="#{delete}">Delete</button>
          </form>
        </td>
      </tr>
    </tbody>
  </table>
</body>
</html>
