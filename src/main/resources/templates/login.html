<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="#{loginPageTitle}">PetClinic :: Login</title>
  <link rel="shortcut icon" type="image/x-icon" th:href="@{/resources/images/favicon.png}">
  <link th:href="@{/webjars/font-awesome/css/font-awesome.min.css}" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/resources/css/petclinic.css}"/>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark" role="navigation">
    <div class="container-fluid">
      <a class="navbar-brand" th:href="@{/}"><span></span></a>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="container xd-container">
      <div class="row justify-content-center mt-5">
        <div class="col-md-4">
          <h2 class="mb-4" th:text="#{signIn}">Sign In</h2>

          <div th:if="${param.error}" class="alert alert-danger">
            Invalid username or password.
          </div>
          <div th:if="${param.logout}" class="alert alert-info">
            You have been signed out.
          </div>

          <form th:action="@{/login}" method="post">
            <div class="mb-3">
              <label for="username" class="form-label" th:text="#{username}">Username</label>
              <input type="text" id="username" name="username" class="form-control" required autofocus/>
            </div>
            <div class="mb-3">
              <label for="password" class="form-label" th:text="#{password}">Password</label>
              <input type="password" id="password" name="password" class="form-control" required/>
            </div>
            <button type="submit" class="btn btn-primary w-100" th:text="#{signIn}">Sign In</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script th:src="@{/webjars/bootstrap/dist/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
